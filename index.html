<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>あっちむいてホイ！トーナメント</title>
 <style>
 /* 全体リセットと共通設定 */
 * { 
 box-sizing: border-box; 
 margin: 0; 
 padding: 0; 
 font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; 
 }
 
 html {
 height: 100%;
 margin: 0;
 padding: 0;
 }
body {
 height: 100vh !important;
 height: 100dvh !important;
 margin: 0 !important;
 /* 上下のセーフエリアパディングを極小化し、ヘッダーとパネルの隙間を排除 */
 padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom) 8px !important;
 box-sizing: border-box;
 /* ★一括の background をやめ、個別の image に分離することで、JavaScriptでの背景切替バグを完全解消 */
 background-image: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%) !important;
 background-size: cover !important;
 background-position: center !important;
 background-repeat: no-repeat !important;
 display: flex !important;
 flex-direction: column !important;
 justify-content: flex-start !important; 
 align-items: center !important;
 overflow: hidden !important;
 position: fixed;
 width: 100%;
 z-index: 1;
 transition: background-image 0.5s ease;
}
 /* 修正：対戦前イントロ画面のテキスト視認性を極限まで強化 */
 .intro-title, 
 #tournament-stage-title {
 font-size: 2.1rem !important;
 font-weight: 900 !important;
 color: #ffffff !important;
 /* 4方向＋斜めに重厚な黒フチを敷くことで、月明かりの白と同化するのを完全に防ぎます */
 text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 0px 3px 6px rgba(0,0,0,0.9) !important;
 margin-bottom: 5px;
 }
 #intro-matchup {
 font-size: 1.3rem !important;
 font-weight: 900 !important;
 color: #ffea00 !important; /* 際立つゲーミングイエローに変更 */
 text-shadow: 1.5px 1.5px 0px #000, -1.5px -1.5px 0px #000, 1.5px -1.5px 0px #000, -1.5px 1.5px 0px #000, 0px 2px 4px rgba(0,0,0,0.8) !important;
 }
 /* 修正：上下に引き離すルールを完全無効化し、パーツを中央にギュッと引き寄せます */
 #app { 
 width: 100% !important; 
 height: 100% !important; 
 display: flex !important; 
 flex-direction: column !important; 
 /* 強制修正：両端への押し付けを完全に破壊し、パーツを中央に集めて隙間をなくします */
 justify-content: center !important; 
 align-items: center !important;
 gap: 5px !important; /* 画面全体のパーツごとの縦の隙間を最小限にロック */
 overflow: hidden !important; 
 padding: calc(env(safe-area-inset-top) + 5px) 2% calc(env(safe-area-inset-bottom) + 5px) 2%; 
 z-index: 2;
 background: transparent !important;
 }
 /* 修正：各画面の背景も完全に透明化 */
 .screen { 
 display: none !important; 
 flex-direction: column; 
 height: 100%; 
 width: 100%; 
 text-align: center; 
 justify-content: center; 
 align-items: center; 
 gap: 2vh; 
 pointer-events: none; 
 position: relative; 
 background: transparent !important;
 }
 .screen.active { 
 display: flex !important; 
 }
 /* 五芒星ゲージMAX入力時の画面全体シェイク（震動）演出 */
 .shake-animation {
 animation: screenShake 0.15s linear infinite !important;
 }
 @keyframes screenShake {
 0% { transform: translate(2px, 1px) rotate(0deg); }
 10% { transform: translate(-1px, -2px) rotate(-1deg); }
 20% { transform: translate(-3px, 0px) rotate(1deg); }
 30% { transform: translate(0px, 2px) rotate(0deg); }
 40% { transform: translate(1px, -1px) rotate(1deg); }
 50% { transform: translate(-1px, 2px) rotate(-1deg); }
 60% { transform: translate(-3px, 1px) rotate(0deg); }
 70% { transform: translate(2px, 1px) rotate(-1deg); }
 80% { transform: translate(-1px, -1px) rotate(1deg); }
 90% { transform: translate(2px, 2px) rotate(0deg); }
 100% { transform: translate(1px, -2px) rotate(-1deg); }
 }
 /* アクリル風・立体ゲーミングトイ風の共通ボタンデザイン */
 button { 
 background: linear-gradient(180deg, #4a90e2 0%, #357abd 100%); 
 color: white; 
 border: none; 
 padding: 16px 32px;

 text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
 }
 button:active { 
 transform: translateY(4px);
 box-shadow: 0 2px 0 #214b78, 0 4px 6px rgba(0,0,0,0.4);
 }

 letter-spacing: -1px;

 #chart-start-btn {

 font-size: min(4.5vw, 2.1vh, 22px); 
 padding: 1.5vh 24px; 
 width: 95%; 
 max-width: 480px; 
 height: auto;

 .dialogue-box { 
 background: rgba(15, 23, 42, 0.85);

 }
/* 上部ステータスバー：枠線を明るく強調 */
.status-bar {

}

 .quit-btn { 
 background: linear-gradient(180deg, #475569 0%, #334155 100%); 
 color: #ffffff; 
 padding: 10px 24px; 
 font-size: 0.9rem; 
 border-radius: 20px; 
 font-weight: bold; 
 box-shadow: 0 4px 0 #1e293b, 0 6px 10px rgba(0,0,0,0.5);
 cursor: pointer;

 pointer-events: auto;

 /* スコアバー */
 .score-bar { 
 font-size: 1.1rem;

 /* 修正：じゃんけん時もホイ時も全く同じベストな縦幅に固定します */
 .character-zone { 
 width: 100% !important; 
 display: flex !important; 
 justify-content: center !important; 
 pointer-events: auto !important; 
 flex-grow: 1 !important; 
 flex-shrink: 1 !important;
 align-items: center !important;
 }
.stage-box { 
 width: 100% !important; 
 max-width: 400px !important; 
 /* ★スマホ画面（縦幅の43%）に完璧にフィットさせはみ出しをゼロにします */

}
.voice-text {
 font-size: clamp(1.5rem, 5.5vh, 2.3rem) !important; 
 font-weight: 900 !important;
 color: #ffea00 !important;

 2px 2px 0px #000, -2px -2px 0px #000, 
 2px -2px 0px #000, -2px 2px 0px #000,
 0px 2px 0px #000, 0px -2px 0px #000,
 2px 0px 0px #000, -2px 0px 0px #000,
 3px 3px 0px #fff, -3px -3px 0px #fff,
 3px -3px 0px #fff, -3px 3px 0px #fff,

}
 /* あなたの攻撃時は「鮮やかなブルーネオン」をオーバーレイ発光 */

.enemy-image-area {

 }

 }

 width: 100%;

 padding: 6px 12px; 
 font-size: 0.95rem; 
 font-weight: 900; 
 text-align: center; 
 border-radius: 6px; 
 text-transform: uppercase; 
 letter-spacing: 1.5px; 
 margin-top: 5px; 
 box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
 display: none; 
 transition: all 0.3s ease;
 z-index: 2;
 }
 .turn-indicator-banner.player-attack { 
 display: block; 
 background: rgba(15, 32, 66, 0.95); 
 color: #38bdf8; 
 border: 2px solid #38bdf8; 
 text-shadow: 0 0 8px #38bdf8; 
 }
 .turn-indicator-banner.enemy-attack { 
 display: block; 
 background: rgba(66, 15, 15, 0.95); 
 color: #f87171; 
 border: 2px solid #f87171; 
 text-shadow: 0 0 8px #f87171; 
 }
 .single-gauge-wrap {
 margin: 0px auto 14px auto !important; 
 }
 .result-title { font-size: min(9vw, 4.5vh, 40px); font-weight: bold; pointer-events: auto; white-space: nowrap; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
 .win { color: #4ade80; text-shadow: 0 0 10px rgba(74,222,128,0.5); }
 .lose { color: #f87171; text-shadow: 0 0 10px rgba(248,113,113,0.5); } 
 .champion-title { font-size: min(10vw, 4.5vh); font-weight: 900; color: #fbbf24; text-shadow: 0 4px 15px rgba(251,191,36,0.6); animation: scaleUp 0.6s ease-out forwards; }
 .trophy-box { font-size: min(20vw, 10vh); line-height: 1; animation: floatAnim 2s ease-in-out infinite; margin: 15px 0; }
 .champion-msg { font-size: 1.15rem; font-weight: bold; color: #f8fafc; line-height: 1.6; max-width: 340px; margin: 0 auto; }
 @keyframes scaleUp { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
 @keyframes floatAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
 @keyframes popOutBounce { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.3); } 100% { transform: scale(1); opacity: 1; } }
 </style>
</head>
<body>
<div id="app">
 <!-- 1. スタート画面 -->
 <div id="start-screen" class="screen active">
 <h1>あっちむいてホイ！</h1>
 <div class="mode-select">
 <div class="mode-title-label">ルールをえらんでね</div>
 <button class="mode-btn selected" onclick="setGameMode('1shot', this)">1発勝負 (KO)</button>
 <button class="mode-btn" onclick="setGameMode('3wins', this)">3本先取</button>
 </div>
 <div class="join-btn-container">
 <button class="main-join-btn" onclick="startTournament()">トーナメントに参戦！</button>
 </div>
 </div>
 
 <!-- 2. トーナメント表画面 -->
 <div id="chart-screen" class="screen">
 <h2 style="font-size: 1.4rem; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">トーナメント表 🏆</h2>
 <div class="chart-box" id="chart-box-container"></div>
 <button id="chart-start-btn" onclick="proceedToIntro()">試合にすすむ！</button>
 </div>
 <!-- 3. 对戦前イントロ画面 -->
 <div id="intro-screen" class="screen">
 <div class="intro-title" id="tournament-stage-title" style="font-size: 1.8rem; font-weight: bold; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">1回戦</div>
 <h2 id="intro-matchup" style="font-size: 1.2rem; color: #cbd5e1; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">プレイヤー VS ？？？</h2>
 <div class="enemy-image-area" style="max-width: 120px; height: 120px;"><img id="intro-enemy-img" src="image/front.png" alt="敵"></div>
 <div class="dialogue-box" id="intro-dialogue">...</div>
 <button style="background: linear-gradient(180deg, #ffa726 0%, #f57c00 100%); box-shadow: 0 6px 0 #b35c00, 0 8px 15px rgba(0,0,0,0.4);" onclick="startBattle()">バトルスタート！</button>
 </div>
 
 <!-- 4. バトルメイン画面（不要テキストを完全排除した最新構造） -->
 <div id="game-screen" class="screen" style="background: transparent !important;">
 <div class="status-bar">
 <span id="match-count">1回戦</span>
 <span id="game-mode-label" style="font-size: 0.85rem; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 4px;">1発KO勝負</span>
 <span id="enemy-name">あいて：ーー</span>
 </div>
 <div class="score-bar" id="score-display">★ 0 - 0 ★</div>
 
 <div class="character-zone">
 <div id="battle-stage-box" class="stage-box">
 <div id="ultra-alert-text" class="ultra-text"> 五芒星の絶対神指 ⭐ ！ ⭐</div>
 <div class="enemy-image-area"><img id="enemy-avatar-display-img" src="image/front.png" alt="あいて"></div>
 
 <!-- 【相手のゲージ】相手の顔イラストのすぐ下に配置 -->
 <div class="single-gauge-wrap">
 <div class="gauge-label-text">あいての五芒星ゲージ</div>
 <div class="gauge-box-ui">
 <div id="enemy-gauge-bar" class="gauge-bar-ui enemy"></div>
 </div>
 </div>
 
 <!-- 現在の攻守がひと目でわかるネオン風バナー -->
 <div id="turn-banner-display" class="turn-indicator-banner">YOUR ATTACK</div>
 <div class="voice-text" id="voice-display">じゃーんけーん…</div>
 
 <!-- 相手の手（中央円盤） -->
 <div class="enemy-hand" id="enemy-hand-display">
 <img id="enemy-hand-img" src="image/gu.png" alt="あいての手">
 </div>
 </div>
 </div>
 <div class="controls">
 <!-- 【自分のゲージ】操作パネル（自分の手）のすぐ上に配置 -->
 <div class="single-gauge-wrap">
 <div class="gauge-label-text">あなたの五芒星ゲージ</div>
 <div class="gauge-box-ui">
 <div id="player-gauge-bar" class="gauge-bar-ui player"></div>
 </div>
 </div>
 
 <!-- じゃんけんUI -->
 <div id="janken-ui" class="janken-controls">
 <button class="janken-btn" onclick="playJanken('✊')"><img src="image/gu.png" alt="グー"></button>
 <button class="janken-btn" onclick="playJanken('✌')"><img src="image/cho.png" alt="チョキ"></button>
 <button class="janken-btn" onclick="playJanken('🖐')"><img src="image/pa.png" alt="パー"></button>
 </div>

 <!-- あっちむいてホイUI（攻守で中身を完全入れ替えする最新ハイブリッド構造） -->
 <div id="hoi-ui" class="hoi-controls" style="display: none;">
 <button class="hoi-btn" style="color: #111111 !important; font-size: 2.2rem !important; font-weight: 900 !important;" onclick="playHoi('上')"><span class="hoi-btn-content">▲</span></button>
 <button class="hoi-btn" style="color: #111111 !important; font-size: 2.2rem !important; font-weight: 900 !important;" onclick="playHoi('左')"><span class="hoi-btn-content">◀</span></button>
 <button class="hoi-btn" style="color: #111111 !important; font-size: 2.2rem !important; font-weight: 900 !important;" onclick="playHoi('右')"><span class="hoi-btn-content">▶</span></button>
 <button class="hoi-btn" style="color: #111111 !important; font-size: 2.2rem !important; font-weight: 900 !important;" onclick="playHoi('下')"><span class="hoi-btn-content">▼</span></button>
 </div>
 <button class="quit-btn" onclick="quitGame()">棄権する</button>
 </div>
 </div>

 <!-- 5. 通常の結果画面 -->
 <div id="result-screen" class="screen">
 <div id="result-text" class="result-title"></div>
 <div class="dialogue-box" id="result-dialogue">...</div>
 <button id="result-next-btn" style="background: linear-gradient(180deg, #66bb6a 0%, #388e3c 100%); box-shadow: 0 6px 0 #1b5e20, 0 8px 15px rgba(0,0,0,0.4);" onclick="nextStep()">次へすすむ</button>
 </div>

 <!-- 6. 完全優勝おめでとう画面 -->
 <div id="champion-screen" class="screen">
 <div class="champion-title"> 完全優勝!! </div> 🏆🏆
 <div class="trophy-box"> 🥇 </div>
 <div class="dialogue-box" style="background: rgba(15, 23, 42, 0.7); border: 2px solid #fbbf24; box-shadow: 0 0 15px rgba(251,191,36,0.3);">
 <p class="champion-msg">すべての強敵を打ち破り、あっちむいてホイ界の頂点に立ちました！偉大なチャンピオンに拍手！</p>
 </div>
 <button style="background: linear-gradient(180deg, #ffa726 0%, #f57c00 100%); box-shadow: 0 6px 0 #b35c00, 0 8px 15px rgba(0,0,0,0.4); margin-top: 15px;" onclick="quitGame()">タイトルへ戻る</button>
 </div>
</div>
<script>
 // グローバルアセット定義
 const hands = ['✊', '✌', '🖐'];
 const dirKeys = ['上', '下', '左', '右'];
 
 // じゃんけん画像と指画像のパス設定
 const handImages = { '✊': 'image/gu.png', '✌': 'image/cho.png', '🖐': 'image/pa.png' };
 const fingerImageSrc = 'image/hand.png'; // あっち向いてホイの共通指画像

 // 基本的な顔画像のデフォルト
 const enemyImages = { '正面': 'image/front.png', '上': 'image/up.png', '下': 'image/down.png', '左': 'image/left.png', '右': 'image/right.png' }; 

 // --- 🎮 キャラクター専用データベース（GitHub Pages完全同期版） ---
 // すべての半角スペースを排除し、テレコ仕様などのこだわりマッピングを完全復元しました
 const internalEnemies = [
 { 
 name: "ノビオ", position: "ライバル", intro: "ずっと練習してたんだ！負けないぞー！", win: "ボクの勝ち！", lose: "うわ〜ん！敗けた！", 
 bg: "image/nobio_bg.png",
 favAttackDirs: ['下','下','下','上','左','右'], favDefendDirs: ['上','上','上','下','左','右'],
 images: { '正面': 'image/nobio_front.png', '上': 'image/nobio_up.png', '下': 'image/nobio_down.png', '左': 'image/nobio_left.png', '右': 'image/nobio_right.png' }
 },
 { 
 name: "お嬢様", position: "ライバル", intro: "オーッホッホ！わたくしの敵ではありませんわ！", win: "当然の結果ですわ。", lose: "敗北するなんて…おのれ！", 
 bg: "image/princess_bg.png",
 favAttackDirs: ['上','上','上','下','左','右'], favDefendDirs: ['右','右','右','上','下','左'],
 images: { '正面': 'image/princess_front.png', '上': 'image/princess_up.png', '下': 'image/princess_down.png', '左': 'image/princess_left.png', '右': 'image/princess_right.png' }
 },
 { 
 name: "熱血ハヤト", position: "ライバル", intro: "俺のパッションは誰にも止められねえ！", win: "うおっしゃあ！勝ちだ！", lose: "クソッ、燃え尽きたぜ…", 
 bg: "image/protagonist_bg.png",
 favAttackDirs: ['右','右','右','上','下','左'], favDefendDirs: ['左','left','左','上','下','右'],
 images: { '正面': 'image/protagonist_front.png', '上': 'image/protagonist_up.png', '下': 'image/protagonist_down.png', '左': 'image/protagonist_left.png', 'left': 'image/protagonist_left.png', '右': 'image/protagonist_right.png' }
 },
 { 
 name: "忍者コタロウ", position: "ライバル", intro: "拙者の高速の術、見切れるでござるか？", win: "忍法あっちむいての術！", lose: "完全に見破られるとは…", 
 bg: "image/ninja_boy_bg.png",
 favAttackDirs: ['左','右','左','右','上','下'], favDefendDirs: ['上','下','上','下','左','右'],
 images: { '正面': 'image/ninja_boy_front.png', '上': 'image/ninja_boy_up.png', '下': 'image/ninja_boy_down.png', '左': 'image/ninja_boy_left.png', '右': 'image/ninja_boy_right.png' }
 },
 { 
 name: "マッド科学者", position: "ライバル", intro: "君の癖はすべて計算通りなのだよ！", win: "計算通りの勝利！", lose: "計算を上回る超直感だと！？", 
 bg: "image/mad_scientist_bg.png",
 favAttackDirs: ['上','下','上','下','左','右'], favDefendDirs: ['左','右','左','右','上','下'],
 /* 【超重要・テレコ完全復元】「scientist_down.png」の時に顔が「上」を向いているという
 イラスト素材の実際の見た目の向きにプログラムのキーを完全に一致させました */
 images: { '正面': 'image/mad_scientist_front.png', '上': 'image/mad_scientist_down.png', '下': 'image/mad_scientist_up.png', '左': 'image/mad_scientist_left.png', '右': 'image/mad_scientist_right.png' }
 },
 { 
 name: "ゲーマー レイ", position: "ライバル", intro: "フレーム単位で君の手は見えているよ。", win: "完全な実力さ。", lose: "君、すごい反射神経だね。", 
 bg: "image/gamer_bg.png",
 favAttackDirs: ['上','右','上','右','下','左'], favDefendDirs: ['下','左','下','左','上','right'],
 images: { '正面': 'image/gamer_front.png', '上': 'image/gamer_up.png', '下': 'image/gamer_down.png', '左': 'image/gamer_left.png', 'right': 'image/gamer_right.png' }
 },
 { 
 name: "魔王ダーク", position: "ライバル", intro: "この最強の恐怖に、君は耐えられるか？", win: "絶望するが良い！", lose: "我が魔王の座が崩れ去るとは…", 
 bg: "image/demon_king_bg.png",
 favAttackDirs: ['上','左','右','下'], favDefendDirs: ['上','左','右','下'],
 images: { '正面': 'image/demon_king_front.png', '上': 'image/demon_king_up.png', '下': 'image/demon_king_down.png', 'safe_down': 'image/demon_king_down.png', '左': 'image/demon_king_left.png', '右': 'image/demon_king_right.png' }
 }
 ];

 // ゲーム状態管理変数
 let gameMode = '1shot', currentStage = 'round1', currentEnemy = null, poolEnemies = [], playerScore = 0, enemyScore = 0, maxWinsNeeded = 1, enemySpeed = 300, loopInterval = null, jankenResult = "", currentHandIndex = 0, isDrawRound = false, playerIndexInTournament = 0;
 let tournamentTree = { round1: [null, null, null, null], semi: [null, null], final: { p1: null, p2: null, winner: null } };
 let playerJankenWins = 0; let enemyJankenWins = 0;

 // 🧠 極限強化AI用：プレイヤーの過去の手を記憶する学習バッファ
 let lastPlayerJankenHand = "";
 let lastPlayerHoiDir = "";

 // 🚀 【実機ラグ完全抹消システム】起動時に全アセットをブラウザに強制フルロード
 const assetCache = [];
 function preloadAllAssets() {
 [fingerImageSrc, 'image/gu.png', 'image/cho.png', 'image/pa.png', 'image/front.png', 'image/up.png', 'image/down.png', 'image/left.png', 'image/right.png'].forEach(s => { const i = new Image(); i.src = s; assetCache.push(i); });
 internalEnemies.forEach(e => {
 if (e.bg) { const i = new Image(); i.src = e.bg; assetCache.push(i); }
 if (e.images) { Object.values(e.images).forEach(s => { const i = new Image(); i.src = s; assetCache.push(i); }); }
 });
 }
 window.addEventListener('DOMContentLoaded', preloadAllAssets);
 // ゲームモード（ルール設定）
 function setGameMode(mode, element) { 
 gameMode = mode; 
 maxWinsNeeded = (mode === '1shot') ? 1 : 3; 
 document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected')); 
 element.classList.add('selected'); 
 }

 // ボイスメッセージ表示（テレビアニメ風ポップアウト演出）
 function setVoiceText(text) { 
 const el = document.getElementById('voice-display'); 
 el.innerText = text; 
 el.style.animation = 'none'; 
 el.offsetHeight; 
 el.style.setProperty('animation', 'popOutBounce 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards', 'important');
 }

 // 画面切り替え制御
 function changeScreen(screenId) { 
 document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
 document.getElementById(screenId).classList.add('active'); 
 if (screenId !== 'game-screen' && screenId !== 'intro-screen') {
 document.body.style.setProperty('background', 'linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%)', 'important');
 }
 }

 // バトル開始（ゲーム画面初期化）
 function startBattle() { 
 changeScreen('game-screen'); 
 document.getElementById('match-count').innerText = currentStage === 'round1' ? "1回戦" : currentStage === 'semi' ? "準決勝" : "決勝戦"; 
 document.getElementById('enemy-name').innerText = `あいて：${currentEnemy.name}`; 
 
 if (currentEnemy.images && currentEnemy.images['正面']) {
 document.getElementById('enemy-avatar-display-img').src = currentEnemy.images['正面'];
 } else {
 document.getElementById('enemy-avatar-display-img').src = enemyImages['正面']; 
 }

 if (currentEnemy.bg) {
 document.body.style.setProperty('background', `url('${currentEnemy.bg}') no-repeat center/cover`, 'important');
 } else {
 document.body.style.setProperty('background', 'linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%)', 'important');
 }

 const stageBox = document.getElementById('battle-stage-box');
 stageBox.style.backgroundImage = "none";
 
 stageBox.classList.remove('player-turn', 'enemy-turn');
 const banner = document.getElementById('turn-banner-display');
 banner.style.display = 'none';
 banner.className = 'turn-indicator-banner';

 playerScore = 0; enemyScore = 0; 
 playerJankenWins = 0; enemyJankenWins = 0; 
 updateScoreDisplay(); 
 updateGaugeUI(); 
 isDrawRound = false; 
 startJankenLoop(); 
 }

 // スコア表示更新
 function updateScoreDisplay() { 
 const el = document.getElementById('score-display'); 
 if (gameMode === '1shot') {
 el.style.display = 'none';
 } else {
 el.style.display = 'block';
 el.innerText = `あなた [ ${'★'.repeat(playerScore)}${'☆'.repeat(3 - playerScore)} ] VS [ ${'★'.repeat(enemyScore)}${'☆'.repeat(3 - enemyScore)} ]`; 
 }
 }

 // 五芒星ゲージUI更新
 function updateGaugeUI() {
 const pBar = document.getElementById('player-gauge-bar');
 const eBar = document.getElementById('enemy-gauge-bar');
 const pPct = (playerJankenWins / 5) * 100;
 const ePct = (enemyJankenWins / 5) * 100;
 pBar.style.width = `${pPct}%`;
 eBar.style.width = `${ePct}%`;
 
 if (playerJankenWins >= 5) pBar.classList.add('max'); else pBar.classList.remove('max');
 if (enemyJankenWins >= 5) eBar.classList.add('max'); else eBar.classList.remove('max');
 }

 // じゃんけん画像シャッフルループ
 function startJankenLoop() { 
 document.getElementById('janken-ui').style.display = 'flex'; 
 document.getElementById('hoi-ui').setAttribute("style", "display:none;");
 document.getElementById('ultra-alert-text').style.display = 'none'; 
 setVoiceText(isDrawRound ? "あいこで…" : "じゃーんけーん…"); 
 
 const stageBox = document.getElementById('battle-stage-box');
 if (stageBox) {
 stageBox.classList.remove('player-turn', 'enemy-turn');
 }
 const banner = document.getElementById('turn-banner-display');
 if (banner) {
 banner.style.display = 'none';
 banner.className = 'turn-indicator-banner';
 }

 // 😈 【魔王ダーク狂乱AI】
 // 自分の五芒星ゲージが4（あと1回で暗黒五芒星指）に達すると、シャッフル速度が30ms（超高速の狂乱状態）に変化
 let currentSpeed = enemySpeed;
 if (currentEnemy && currentEnemy.name === "魔王ダーク" && enemyJankenWins === 4) {
 currentSpeed = 30; 
 }

 const hDisplay = document.getElementById('enemy-hand-display'); 
 if (currentStage === 'round1') { 
 currentHandIndex = (currentHandIndex + 1) % hands.length;
 } else { 
 currentHandIndex = Math.floor(Math.random() * hands.length); 
 }
 const firstHand = hands[currentHandIndex];
 hDisplay.innerHTML = `<img id="enemy-hand-img" src="${handImages[firstHand]}" alt="あいての手">`;

 clearInterval(loopInterval);
 loopInterval = setInterval(() => { 
 if (currentStage === 'round1') { 
 currentHandIndex = (currentHandIndex + 1) % hands.length; 
 } else { 
 currentHandIndex = Math.floor(Math.random() * hands.length); 
 }
 const targetHand = hands[currentHandIndex];
 const hImg = document.getElementById('enemy-hand-img');
 if (hImg) {
 hImg.src = handImages[targetHand];
 } else {
 hDisplay.innerHTML = `<img id="enemy-hand-img" src="${handImages[targetHand]}" alt="あいての手">`;
 }
 }, currentSpeed); 
 }
 // プレイヤーがじゃんけんの手を選択したときの判定関数
 function playJanken(playerHand) {
 clearInterval(loopInterval); 
 const evh = hands[currentHandIndex]; 
 // 相手の確定した手を画像で表示
 const hImg = document.getElementById('enemy-hand-img');
 if (hImg) hImg.src = handImages[evh];
 setVoiceText(isDrawRound ? "しょ！" : "ぽん！");
 
 // 🧠 プレイヤーの手を学習バッファへ記憶
 lastPlayerJankenHand = playerHand;
 
 if (playerHand === evh) { 
 jankenResult = "draw"; 
 isDrawRound = true; 
 setTimeout(() => { startJankenLoop(); }, 1200); 
 return; 
 }
 
 // 勝敗判定。戦闘カード(.stage-box)の半透明カラーネオン発光クラスと連動
 const stageBox = document.getElementById('battle-stage-box');
 const banner = document.getElementById('turn-banner-display');
 stageBox.classList.remove('player-turn', 'enemy-turn');
 if ((playerHand === '✊' && evh === '✌') || (playerHand === '✌' && evh === '🖐') || (playerHand === '🖐' && evh === '✊')) { 
 jankenResult = "player_attack"; 
 stageBox.classList.add('player-turn'); // 青ネオン発光をオーバーレイ
 banner.innerText = " YOUR ATTACK ⚔⚔ "; 
 banner.className = "turn-indicator-banner player-attack";
 } else { 
 jankenResult = "enemy_attack"; 
 stageBox.classList.add('enemy-turn'); // 赤ネオン発光をオーバーレイ
 banner.innerText = " ENEMY ATTACK 🛡🛡 "; 
 banner.className = "turn-indicator-banner enemy-attack"; 
 } 
 setTimeout(() => { setupHoi(); }, 1000);
 }

 // あっちむいてホイのセットアップ（攻守表示の完全同期ハイブリッド構造）
 function setupHoi() { 
 document.getElementById('janken-ui').style.display = 'none'; 
 document.getElementById('hoi-ui').removeAttribute("style");
 
 const hDisplay = document.getElementById('enemy-hand-display');
 const alertEl = document.getElementById('ultra-alert-text');
 const btnContents = document.querySelectorAll('.hoi-btn-content');
 
 // スマホの描画負荷を最小限にするため、innerHTMLを汚さずに骨組みを固定してタイムラグを根絶
 hDisplay.innerHTML = `<div id="enemy-question-text" style="color:#111111; font-size:3rem; font-weight:900;">❓</div>
                        <img id="enemy-hand-img" class="finger-img" src="${fingerImageSrc}" alt="指" style="display:none; width:85%; height:85%; object-fit:contain;">`;
 
 if (jankenResult === "player_attack") {
 // ーー 【 あなたが攻撃側のとき 】 ーー
 // 1. 中央の白い円盤は、相手がどこを向くか見えないように「❓」を表示
 const qText = document.getElementById('enemy-question-text');
 if (qText) qText.style.display = 'block';
 
 // 2. 下部の操作ボタンは、あなたが指を差す側なので「指画像（hand.png）」を表示して分かりやすく誘導
 btnContents[0].innerHTML = `<img class="finger-img dir-up" src="${fingerImageSrc}" style="width:75%; height:75%; object-fit:contain; transform:rotate(-90deg);">`;
 btnContents[1].innerHTML = `<img class="finger-img dir-left" src="${fingerImageSrc}" style="width:75%; height:75%; object-fit:contain; transform:scaleX(-1);">`;
 btnContents[2].innerHTML = `<img class="finger-img dir-right" src="${fingerImageSrc}" style="width:75%; height:75%; object-fit:contain; transform:scale(1);">`;
 btnContents[3].innerHTML = `<img class="finger-img dir-down" src="${fingerImageSrc}" style="width:75%; height:75%; object-fit:contain; transform:rotate(90deg);">`;
 
 if (playerJankenWins >= 5) {
 alertEl.innerText = " 五芒星の絶対神指 ⭐ ！ ⭐ ";
 alertEl.style.display = 'block';
 setVoiceText("神の領域…！");
 } else {
 setVoiceText("あっち向いて―");
 }
 } else {
 // ーー 【 あなたが防御側のとき 】 ーー
 // 1. 中央の白い円盤は、合図の瞬間に相手の指が飛び出すので、それまで一旦隠しておきます（または「❓」）
 const qText = document.getElementById('enemy-question-text');
 if (qText) qText.style.display = 'block';
 
 // 2. 下部の操作ボタンは、あなたが顔をのける側なので、防御時に見やすいはっきりとした「黒三角（▲▼◀▶）」を表示
 btnContents[0].innerText = "▲";
 btnContents[1].innerText = "◀";
 btnContents[2].innerText = "▶";
 btnContents[3].innerText = "▼";
 
 if (enemyJankenWins >= 5) {
 alertEl.innerText = " 敵の暗黒五芒星指 ⚠ ！ ⚠ ";
 alertEl.style.display = 'block';
 setVoiceText("絶体絶命…！");
 } else {
 setVoiceText("あっち向いて―"); 
 }
 }
 }
 // あっちむいてホイの方向選択・勝敗判定
 function playHoi(playerDir) {
 if ((jankenResult === "player_attack" && playerJankenWins >= 5) || (jankenResult === "enemy_attack" && enemyJankenWins >= 5)) {
 document.body.classList.add('shake-animation');
 setTimeout(() => { document.body.classList.remove('shake-animation'); }, 600);
 }
 document.getElementById('ultra-alert-text').style.display = 'none';
 setVoiceText("ほい！"); 
 document.getElementById('hoi-ui').setAttribute("style", "display:none;");
 
 let ek = "";
 const av = document.getElementById('enemy-avatar-display-img');
 
 // スマホの描画負荷を最小限にするため、innerHTMLを壊さずdisplay切り替えだけで指画像を出現
 const qText = document.getElementById('enemy-question-text');
 if (qText) qText.style.display = 'none';
 const fImg = document.getElementById('enemy-hand-img');
 if (fImg) fImg.style.display = 'block';
 
 if (jankenResult === "player_attack") {
 if (playerJankenWins >= 5) {
 ek = playerDir; // 確定勝利システム（絶対神指）
 } else {
 // 🧠 CPU固有AI思考ロジック（防御）
 if (currentEnemy.name === "マッド科学者" && lastPlayerHoiDir) {
 // 🧠 マッド科学者の心理分析：プレイヤーが「前回と同じ方向」に指を指すと予測し、75%の確率でそこを回避
 if (Math.random() < 0.75) {
 const safeDirs = dirKeys.filter(d => d !== lastPlayerHoiDir);
 ek = safeDirs[Math.floor(Math.random() * safeDirs.length)];
 } else {
 ek = dirKeys[Math.floor(Math.random() * dirKeys.length)];
 }
 } else if (currentEnemy.name === "魔王ダーク" && enemyJankenWins === 4) {
 // 😈 魔王ダーク狂乱：ピンチになると、逃げ癖のプールをプレイヤーの予測を覆す「上・下」のみの縦型に完全固定
 const darkDefendPool = ['上', '下'];
 ek = darkDefendPool[Math.floor(Math.random() * darkDefendPool.length)];
 } else {
 const defendPool = currentEnemy.favDefendDirs || ['上','下','左','右'];
 ek = defendPool[Math.floor(Math.random() * defendPool.length)];
 if (ek === 'left') ek = '左';
 }
 }
 // あなたの攻撃時：敵はおののいて顔を逃げる方向（ek）へ向ける
 if (currentEnemy.images && currentEnemy.images[ek]) { av.src = currentEnemy.images[ek]; } else { av.src = enemyImages[ek] || 'image/front.png'; }
 
 // あなたの攻撃時：中央の円盤に、あなたが差し向けた「確定した指の方向」を表示
 applyFingerDirection(fImg, playerDir); 
 } else {
   if (enemyJankenWins >= 5) {
     ek = playerDir; // 相手の確定勝利（暗黒五芒星指）
   } else {
     // 🧠 CPU固有AI思考ロジック（攻撃）
     if (currentEnemy.name === "マッド科学者" && lastPlayerHoiDir) {
       // 🧠 マッド科学者の心理分析：プレイヤーが「前回逃げた方向」へもう一度逃げると予測し、70%の超高確率でそこを狙い撃ち
       if (Math.random() < 0.70) {
         ek = lastPlayerHoiDir; 
       } else {
         ek = dirKeys[Math.floor(Math.random() * dirKeys.length)];
       }
     } else if (currentEnemy.name === "魔王ダーク" && enemyJankenWins === 4) {
       // 😈 魔王ダーク狂乱：ピンチになると、攻撃方向が「左・右」のみの超攻撃型2択へと完全変貌
       const darkAttackPool = ['左', '右'];
       ek = darkAttackPool[Math.floor(Math.random() * darkAttackPool.length)];
     } else {
       const attackPool = currentEnemy.favAttackDirs || ['上','下','左','右'];
       ek = attackPool[Math.floor(Math.random() * attackPool.length)];
     }
   }
   
   // 相手の攻撃時：ご指示通り、相手のイラストは常に正面をキープ
   if (currentEnemy.images && currentEnemy.images['正面']) { av.src = currentEnemy.images['正面']; } else { av.src = enemyImages['正面'] || 'image/front.png'; }
   
   // 相手の攻撃時：中央の円盤に、相手が攻めてきた「敵の指」を出現させて回転
   applyFingerDirection(fImg, ek); 
 }
 
 // 🧠 今回のプレイヤーの動向を次回の学習ログへ記憶
 lastPlayerHoiDir = playerDir;
 
 setTimeout(() => {
   if (fImg) fImg.className = "finger-img";
   if (currentEnemy.images && currentEnemy.images['正面']) { av.src = currentEnemy.images['正面']; } else { av.src = enemyImages['正面']; } 
   if (playerDir === ek) { 
     if (jankenResult === "player_attack") { playerScore++; } else { enemyScore++; }
     playerJankenWins = 0; enemyJankenWins = 0;
     updateScoreDisplay(); updateGaugeUI();
     if (playerScore >= maxWinsNeeded) { endBattle("win"); } else if (enemyScore >= maxWinsNeeded) { endBattle("lose"); } else { isDrawRound = false; startJankenLoop(); } 
   } else { 
     if (jankenResult === "player_attack") { playerJankenWins = Math.min(5, playerJankenWins + 1); } else { enemyJankenWins = Math.min(5, enemyJankenWins + 1); }
     isDrawRound = false; updateGaugeUI(); startJankenLoop();
   }
 }, 1500);
}

// 指画像の4方向CSSクラス適用補助関数（ミリ単位の回転制御を完全復元）
function applyFingerDirection(element, dir) {
 element.className = "finger-img"; // 一度リセット
 if (dir === '右') element.classList.add('dir-right');
 if (dir === '左') element.classList.add('dir-left');
 if (dir === '上') element.classList.add('dir-up');
 if (dir === '下') element.classList.add('dir-down');
}
// バトル終了処理
function endBattle(result) {
  const rt = document.getElementById('result-text');
  const rd = document.getElementById('result-dialogue');
  const nb = document.getElementById('result-next-btn');
  
  const stageBox = document.getElementById('battle-stage-box');
  stageBox.classList.remove('player-turn', 'enemy-turn');
  document.getElementById('turn-banner-display').style.display = 'none';
  if (result === "win") { 
    rt.innerText = " 勝ち抜け！ 🎉🎉 "; 
    rt.className = "result-title win"; 
    rd.innerHTML = `${currentEnemy.name}：<br>「${currentEnemy.lose}」`; 
    nb.innerText = "トーナメント表へ"; 
  } else { 
    rt.innerText = " 敗北... 😭😭 "; 
    rt.className = "result-title lose"; 
    rd.innerHTML = `${currentEnemy.name}：<br>「${currentEnemy.win}」`; 
    nb.innerText = "タイトルへ"; 
  } 
  changeScreen('result-screen');
}

// トーナメント開始
function startTournament() {
  currentStage = 'round1'; playerScore = 0; enemyScore = 0;
  playerIndexInTournament = Math.floor(Math.random() * 8);
  let allEnemies = [...internalEnemies].sort(() => Math.random() - 0.5);
  let flatSeats = new Array(8);
  flatSeats[playerIndexInTournament] = { name: "あなた", isPlayer: true };
  let enemyIdx = 0;
  for (let i = 0; i < 8; i++) {
    if (i !== playerIndexInTournament) { flatSeats[i] = allEnemies[enemyIdx++]; }
  }
  for (let i = 0; i < 4; i++) {
    tournamentTree.round1[i] = { p1: flatSeats[i * 2], p2: flatSeats[i * 2 + 1], winner: null };
  }
  tournamentTree.semi = [ { p1: null, p2: null, winner: null }, { p1: null, p2: null, winner: null } ];
  tournamentTree.final = { p1: null, p2: null, winner: null };
  playerJankenWins = 0; enemyJankenWins = 0;
  drawTournamentChart(); 
  changeScreen('chart-screen');
}
 // トーナメント表の描画
 function drawTournamentChart() {
   const container = document.getElementById('chart-box-container'); 
   container.innerHTML = "";
   
   let html = `<div class="tournament-container">`;
   
   // 1段目: 1回戦枠（一番下）
   html += `<div class="tournament-round">`;
   tournamentTree.round1.forEach((match) => {
     [match.p1, match.p2].forEach(p => {
       if (!p) return;
       let pClass = p.isPlayer ? "player-node is-me" : "player-node";
       if (match.winner === p) pClass += " is-winner";
       html += `<div class="match-slot"><div class="${pClass}">${match.winner === p ? '👑 ' : ''}${p.name}</div></div>`;
     });
   });
   html += `</div>`;

   // 2段目: 準決勝枠（縦書きで綺麗に回転する全角かっこ「（勝者）」に対応）
   html += `<div class="tournament-round">`;
   for (let i = 0; i < 2; i++) {
     let m = tournamentTree.semi[i], p1 = m ? m.p1 : null, p2 = m ? m.p2 : null;
     [p1, p2].forEach((p, idx) => {
       html += `<div class="match-slot" style="visibility: hidden;"></div>`;
       let name = p ? p.name : "（" + " " + "勝者" + " " + "）";
       let pClass = (p && p.isPlayer) ? "player-node is-me" : "player-node";
       if (m && m.winner && m.winner === p) pClass += " is-winner";
       html += `<div class="match-slot"><div class="${pClass}">${m && m.winner === p ? '👑 ' : ''}${name}</div></div>`; 
       html += `<div class="match-slot" style="visibility: hidden;"></div>`;
     });
   }
   html += `</div>`;

   // 3段目: 決勝戦枠
   html += `<div class="tournament-round">`;
   let f = tournamentTree.final; let f1 = f ? f.p1 : null; let f2 = f ? f.p2 : null;
   [f1, f2].forEach((p, idx) => {
     html += `<div class="match-slot" style="visibility: hidden;"></div>`;
     html += `<div class="match-slot" style="visibility: hidden;"></div>`;
     let name = p ? p.name : "（" + " " + "勝者" + " " + "）";
     let pClass = (p && p.isPlayer) ? "player-node is-me" : "player-node";
     if (f && f.winner && f.winner === p) pClass += " is-winner"; 
     html += `<div class="match-slot"><div class="${pClass}">${f && f.winner === p ? '👑 ' : ''}${name}</div></div>`; 
     html += `<div class="match-slot" style="visibility: hidden;"></div>`;
     html += `<div class="match-slot" style="visibility: hidden;"></div>`;
   });
   html += `</div>`;
   
   // 4段目: 優勝者枠（一番上）
   let finalWinnerName = "（" + " " + "優勝者" + " " + "）", winnerClass = "player-node";
   if (f && f.winner) { 
     finalWinnerName = f.winner.name; 
     winnerClass += f.winner.isPlayer ? " is-me is-winner" : " is-winner";
   }
   
   html += '<div class="tournament-round">';
   for(let k=0; k<3; k++) { html += '<div class="match-slot" style="visibility: hidden;"></div>'; }
   html += `<div class="match-slot" style="--line-display: none; width: 25%;"><div class="${winnerClass}" style="border-width:2px; background: linear-gradient(180deg, #fffde7 0%, #fff9c4 100%); color: #b78103; box-shadow: 0 0 10px rgba(251,191,36,0.5); width: 100%;">✨ ${finalWinnerName} ✨</div></div>`; 
   for(let k=0; k<3; k++) { html += '<div class="match-slot" style="visibility: hidden;"></div>'; }
   html += '</div>';
   html += `</div>`;
   container.innerHTML = html; 
   updateBattleStartButton();
 }

 // 対戦相手選択ボタンのテキスト更新
 function updateBattleStartButton() {
   let btn = document.getElementById('chart-start-btn'); if (!btn) return;
   if (currentStage === 'round1') { 
     let m = tournamentTree.round1.find(m => m && m.p1 && m.p2 && (m.p1.isPlayer || m.p2.isPlayer) && !m.winner); 
     if (m) { currentEnemy = m.p1.isPlayer ? m.p2 : m.p1; btn.innerText = `${currentEnemy.name}戦に挑む！`; }
   } else if (currentStage === 'semi') { 
     let m = tournamentTree.semi.find(m => m && m.p1 && m.p2 && ((m.p1.isPlayer) || (m.p2.isPlayer)) && !m.winner); 
     if (m) { currentEnemy = m.p1.isPlayer ? m.p2 : m.p1; btn.innerText = `準決勝：${currentEnemy.name} 戦！`; }
   } else if (currentStage === 'final') { 
     let m = tournamentTree.final; 
     if (m && m.p1 && m.p2) { currentEnemy = m.p1.isPlayer ? m.p2 : m.p1; btn.innerText = `決勝戦：${currentEnemy.name}！`; }
   }
 }

 // 試合前のイントロ画面へ移行（100%確実な最背面背景連動システム）
 function proceedToIntro() {
   document.getElementById('tournament-stage-title').innerText = currentStage === 'round1' ? "1回戦" : currentStage === 'semi' ? "準決勝" : "決勝戦";
   document.getElementById('intro-matchup').innerText = `プレイヤー VS ${currentEnemy.name}`; 
   document.getElementById('intro-dialogue').innerText = `「${currentEnemy.intro}」`; 
   if (currentEnemy.images && currentEnemy.images['正面']) {
     document.getElementById('intro-enemy-img').src = currentEnemy.images['正面'];
   } else {
     document.getElementById('intro-enemy-img').src = enemyImages['正面'];
   }
   if (currentEnemy.bg) {
     document.body.style.setProperty('background', `url('${currentEnemy.bg}') no-repeat center/cover`, 'important');
   } else {
     document.body.style.setProperty('background', 'linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #0d1b2a 100%)', 'important');
   }
   enemySpeed = currentStage === 'round1' ? 300 : currentStage === 'semi' ? 140 : 60; 
   changeScreen('intro-screen');
 }

 // 次のステップへ進行（トーナメント表の勝利フラグ書き換え ＆ ステージアップ）
 function nextStep() {
   if (document.getElementById('result-text').innerText.includes("敗北")) { 
     quitGame(); return; 
   }
   if (currentStage === 'round1') {
     let myMatch = tournamentTree.round1.find(m => m && (m.p1.isPlayer || m.p2.isPlayer) && !m.winner); 
     if (myMatch) { myMatch.winner = myMatch.p1.isPlayer ? myMatch.p1 : myMatch.p2; }
     tournamentTree.round1.forEach(match => { if (match && !match.winner) match.winner = Math.random() > 0.5 ? match.p1 : match.p2; });
     tournamentTree.semi = [
       { p1: tournamentTree.round1[0].winner, p2: tournamentTree.round1[1].winner, winner: null },
       { p1: tournamentTree.round1[2].winner, p2: tournamentTree.round1[3].winner, winner: null }
     ];
     currentStage = 'semi'; drawTournamentChart(); 
     changeScreen('chart-screen');
   } else if (currentStage === 'semi') {
     let myMatch = tournamentTree.semi.find(m => m && ((m.p1 && m.p1.isPlayer) || (m.p2 && m.p2.isPlayer)) && !m.winner); 
     if (myMatch) { myMatch.winner = (myMatch.p1 && myMatch.p1.isPlayer) ? myMatch.p1 : myMatch.p2; }
     let cpuMatch = tournamentTree.semi.find(m => m && !((m.p1 && m.p1.isPlayer) || (m.p2 && m.p2.isPlayer))); 
     if (cpuMatch) { cpuMatch.winner = Math.random() > 0.5 ? cpuMatch.p1 : cpuMatch.p2; }
     tournamentTree.final = { p1: tournamentTree.semi[0].winner, p2: tournamentTree.semi[1].winner, winner: null };
     currentStage = 'final'; drawTournamentChart(); 
     changeScreen('chart-screen');
   } else { 
     let f = tournamentTree.final; 
     f.winner = (f.p1 && f.p1.isPlayer) ? f.p1 : f.p2; 
     drawTournamentChart();
     changeScreen('champion-screen'); 
   }
 }

 // 棄権・タイトルへ戻る
 function quitGame() { 
   clearInterval(loopInterval); 
   changeScreen('start-screen'); 
 }
</script>
